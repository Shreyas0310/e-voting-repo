<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RAIT E-Voting System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-container">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <div class="text-center">
                <div class="flex justify-center items-center space-x-3 mb-6">
                    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center">
                        <span class="maroon-text font-bold text-xl">RAIT</span>
                    </div>
                    <h2 class="text-3xl font-bold text-white">RAIT E-Voting</h2>
                </div>
                <h2 class="text-2xl font-bold text-white">Student Login</h2>
                <p class="mt-2 text-gray-200">Enter your credentials to access the voting system</p>
            </div>
            
            <div class="login-box p-8">
                <form id="loginForm" class="space-y-6">
                    <div>
                        <label for="rollNo" class="block text-sm font-medium text-gray-700">Roll Number</label>
                        <div class="mt-1 relative">
                            <input id="rollNo" name="rollNo" type="text" required 
                                class="appearance-none block w-full px-3 py-3 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-maroon focus:border-maroon"
                                placeholder="23IT1001">
                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <i class="fas fa-id-card text-gray-400"></i>
                            </div>
                        </div>
                        <p class="mt-1 text-xs text-gray-500">Format: 23IT1001 to 23IT1020</p>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <div class="mt-1 relative">
                            <input id="password" name="password" type="password" required 
                                class="appearance-none block w-full px-3 py-3 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-maroon focus:border-maroon"
                                placeholder="Enter your password">
                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <i class="fas fa-lock text-gray-400"></i>
                            </div>
                        </div>
                        <p class="mt-1 text-xs text-gray-500">Default password: rait@123</p>
                    </div>

                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input id="remember-me" name="remember-me" type="checkbox" 
                                class="h-4 w-4 text-maroon focus:ring-maroon border-gray-300 rounded">
                            <label for="remember-me" class="ml-2 block text-sm text-gray-700">Remember me</label>
                        </div>

                        <div class="text-sm">
                            <a href="#" class="font-medium maroon-text hover:text-maroon">Forgot password?</a>
                        </div>
                    </div>

                    <div>
                        <button type="submit" 
                            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white maroon-bg hover:bg-maroon focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-maroon transition">
                            <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                                <i class="fas fa-sign-in-alt text-gray-300 group-hover:text-gray-400"></i>
                            </span>
                            Sign in
                        </button>
                    </div>
                </form>

                <div class="mt-6">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-300"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-white text-gray-500">Quick Links</span>
                        </div>
                    </div>

                    <div class="mt-4 grid grid-cols-2 gap-3">
                        <a href="index.html" class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
                            <i class="fas fa-home mr-2"></i> Home
                        </a>
                        <a href="results.html" class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
                            <i class="fas fa-chart-bar mr-2"></i> Results
                        </a>
                    </div>
                </div>
            </div>

            <div class="text-center text-white">
                <p class="text-sm">Need help? Contact <span class="font-semibold">it-support@rait.ac.in</span></p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
